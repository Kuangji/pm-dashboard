name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pm-dashboard
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clone drafts repository
        run: |
          git clone --depth 1 --branch main \
            https://github.com/${{ github.repository_owner }}/drafts.git \
            /tmp/drafts-clone

      - name: Sync content and build
        env:
          DRAFTS_ROOT: /tmp/drafts-clone/publish
        run: |
          npm run sync
          npm run build

      - name: Deploy to Vercel
        uses: vercel/action-deploy@v1
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
